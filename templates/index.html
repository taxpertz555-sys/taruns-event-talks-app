<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes & Share Hub</title>
    <meta name="description" content="Stay up to date with BigQuery release notes and share key updates directly to X (formerly Twitter).">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Link -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="glow-bg"></div>
    
    <div class="app-container">
        <!-- Sidebar/Header -->
        <header class="app-header">
            <div class="logo-area">
                <svg class="bq-logo" viewBox="0 0 24 24" width="36" height="36">
                    <path fill="#4285F4" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <div class="title-group">
                    <h1>BigQuery Updates</h1>
                    <p class="subtitle">Live Release Monitor &amp; Share Hub</p>
                </div>
            </div>
            
            <div class="header-actions">
                <div class="stats-badge" id="stats-badge">
                    <span class="pulse-dot"></span>
                    <span id="stats-text">Loading releases...</span>
                </div>
                <button id="export-csv-btn" class="btn btn-secondary" title="Export Current Filtered Releases to CSV">
                    <svg class="icon" viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
                    </svg>
                    <span>Export CSV</span>
                </button>
                <button id="theme-toggle" class="btn btn-secondary btn-icon-only" title="Toggle Light/Dark Mode">
                    <svg class="icon theme-icon-dark" viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.9.5-.1 1 .3 1.1.8.1.5-.2 1-.7 1.2-3.4 1.4-5.7 4.8-5.7 8.6 0 4.2 3.5 7.6 7.8 7.6 2.2 0 4.3-1 5.7-2.6.3-.4.9-.5 1.3-.2.4.3.5.9.2 1.3-1.9 2.1-4.7 3.2-7.9 3.2z"/>
                    </svg>
                    <svg class="icon theme-icon-light hidden" viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37a.996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.02.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06a.996.996 0 0 0-1.41 0zm-12.37 12.37a.996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.02.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06a.996.996 0 0 0-1.41 0z"/>
                    </svg>
                </button>
                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <svg class="icon spinner-icon" id="spinner" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Search and Filter Bar -->
        <section class="filter-section">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
                    <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search releases by keyword (e.g. JSON, SQL, partition)..." autocomplete="off">
            </div>
            
            <div class="filter-tabs" id="filter-tabs">
                <button class="tab active" data-type="all">All Updates</button>
                <button class="tab" data-type="feature">Features</button>
                <button class="tab" data-type="change">Changes &amp; Fixes</button>
                <button class="tab" data-type="deprecation">Deprecations</button>
            </div>
        </section>

        <!-- Main Layout Grid -->
        <main class="main-content">
            <!-- Left Side: List of Updates -->
            <section class="releases-column">
                <div id="loading-skeleton" class="skeleton-list">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
                
                <div id="empty-state" class="empty-state hidden">
                    <svg viewBox="0 0 24 24" width="48" height="48">
                        <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <h3>No releases found</h3>
                    <p>Try resetting filters or changing your search query.</p>
                    <button id="reset-filters-btn" class="btn btn-secondary btn-sm" style="margin-top: 0.5rem;">Reset Filters</button>
                </div>

                <div id="releases-list" class="releases-list"></div>
            </section>

            <!-- Right Side: Detail View & Tweeter Composer -->
            <section class="detail-column">
                <!-- Select Prompt -->
                <div id="detail-placeholder" class="detail-placeholder">
                    <div class="placeholder-icon">
                        <svg viewBox="0 0 24 24" width="64" height="64">
                            <path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                        </svg>
                    </div>
                    <h3>Select an update</h3>
                    <p>Click on any release note from the list to view its full details and draft a tweet.</p>
                </div>

                <!-- Active Detail View -->
                <div id="detail-view" class="detail-view hidden">
                    <div class="detail-card">
                        <div class="detail-header">
                            <div class="detail-meta">
                                <span id="detail-date" class="date-badge"></span>
                                <span id="detail-category" class="cat-badge"></span>
                            </div>
                            <h2 id="detail-title"></h2>
                            <a id="detail-link" href="#" target="_blank" class="docs-link">
                                <span>View official docs</span>
                                <svg viewBox="0 0 24 24" width="14" height="14">
                                    <path fill="currentColor" d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
                                </svg>
                            </a>
                        </div>
                        
                        <div id="detail-body" class="detail-body HTMLContent"></div>
                    </div>

                    <!-- Tweet Composer Widget -->
                    <div class="tweet-composer">
                        <div class="composer-header">
                            <h3>
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                </svg>
                                Share on X
                            </h3>
                            <span class="char-counter" id="char-counter">0 / 280</span>
                        </div>
                        
                        <div class="composer-body">
                            <textarea id="tweet-textarea" rows="4" placeholder="Craft your perfect update tweet..."></textarea>
                        </div>
                        
                        <div class="composer-footer">
                            <div class="composer-actions-left" style="display: flex; gap: 0.5rem;">
                                <button id="suggest-tweet-btn" class="btn btn-secondary" title="Auto-summarize update for Tweet">
                                    <svg viewBox="0 0 24 24" width="16" height="16">
                                        <path fill="currentColor" d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6A4.997 4.997 0 0 1 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.09-2.15 4.1z"/>
                                    </svg>
                                    <span>Auto-Draft</span>
                                </button>
                                <button id="copy-tweet-btn" class="btn btn-secondary" title="Copy tweet text to clipboard">
                                    <svg viewBox="0 0 24 24" width="16" height="16">
                                        <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                                    </svg>
                                    <span>Copy Text</span>
                                </button>
                            </div>
                            <button id="tweet-btn" class="btn btn-tweet">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                </svg>
                                <span>Post Tweet</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- JavaScript Link -->
    <script src="/static/script.js"></script>
</body>
</html>
